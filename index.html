<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unimark - Location-Aware Attendance</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- External Styles -->
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="root"></div>

    <!-- Main App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- UTILS ---
        function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Radius of the earth in m
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const d = R * c; // Distance in m
            return d;
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }

        function getMockOrRealLocation(onSuccess) {
            let handled = false;
            
            const handleFallback = () => {
                if (!handled) {
                    handled = true;
                    console.warn("Using simulated coordinates (browser blocked GPS or timed out).");
                    onSuccess({ coords: { latitude: 40.7128, longitude: -74.0060 }, isMock: true });
                }
            };

            if (!navigator.geolocation) {
                handleFallback();
                return;
            }

            // Give the user 30 seconds to click "Allow" on the permission prompt
            const waitTime = window.location.protocol === 'file:' ? 4000 : 30000;
            const timeout = setTimeout(handleFallback, waitTime);

            try {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        if (!handled) {
                            handled = true;
                            clearTimeout(timeout);
                            onSuccess(position);
                        }
                    },
                    (err) => {
                        clearTimeout(timeout);
                        handleFallback();
                    },
                    { enableHighAccuracy: true, timeout: waitTime, maximumAge: 0 }
                );
            } catch (error) {
                console.error("Synchronous error during geolocation:", error);
                clearTimeout(timeout);
                handleFallback();
            }
        }

        const generateCode = () => Math.floor(100000 + Math.random() * 900000).toString();

        // --- MOCK DATA STORE ---
        // In a real app, this would be a database/backend like Firebase or Supabase.
        const MOCK_STUDENTS = [
            { id: 'S001', name: 'Alice Johnson' },
            { id: 'S002', name: 'Bob Smith' },
            { id: 'S003', name: 'Charlie Davis' },
            { id: 'S004', name: 'Diana Prince' },
        ];

        window._inMemorySession = null;

        const getGlobalSession = () => {
            try {
                const s = localStorage.getItem('unimark_session');
                return s ? JSON.parse(s) : window._inMemorySession;
            } catch (e) { return window._inMemorySession; }
        };

        const setGlobalSession = (session) => {
            window._inMemorySession = session;
            try {
                if (session) {
                    localStorage.setItem('unimark_session', JSON.stringify(session));
                } else {
                    localStorage.removeItem('unimark_session');
                }
            } catch (e) {
                console.warn('localStorage is restricted, using in-memory session only.');
            }
        };

        // --- ICONS (SVG) ---
        const Icons = {
            Teacher: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c3 3 9 3 12 0v-5" /></svg>,
            Student: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>,
            Admin: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="9" y1="21" x2="9" y2="9" /></svg>,
            MapPin: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></svg>,
            Lock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>,
            Check: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
        };

        // --- COMPONENTS ---

        function RoleSelection({ setRole }) {
            return (
                <div className="container" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: '100vh' }}>
                    <div className="glass-panel auth-container animate-fade-in">
                        <h1 className="text-gradient">Unimark</h1>
                        <p>Location-Aware Attendance System</p>

                        <div className="role-selector">
                            <div className="glass-card role-card" onClick={() => setRole('teacher')}>
                                <div className="role-icon" style={{ color: 'var(--primary)' }}><Icons.Teacher /></div>
                                <div>
                                    <h3>Teacher</h3>
                                    <p style={{ margin: 0, fontSize: '0.875rem' }}>Create sessions & manage attendance</p>
                                </div>
                            </div>

                            <div className="glass-card role-card" onClick={() => setRole('student')}>
                                <div className="role-icon" style={{ color: 'var(--secondary)' }}><Icons.Student /></div>
                                <div>
                                    <h3>Student</h3>
                                    <p style={{ margin: 0, fontSize: '0.875rem' }}>Mark your attendance via GPS</p>
                                </div>
                            </div>

                            <div className="glass-card role-card" onClick={() => setRole('admin')}>
                                <div className="role-icon" style={{ color: 'var(--success)' }}><Icons.Admin /></div>
                                <div>
                                    <h3>Admin / ERP</h3>
                                    <p style={{ margin: 0, fontSize: '0.875rem' }}>View reports & analytics</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function TeacherDashboard({ logout }) {
            const [sessionCode, setSessionCode] = useState(null);
            const [attendees, setAttendees] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const [subject, setSubject] = useState('Computer Science 101');
            const [className, setClassName] = useState('B.Tech Year 3');
            const [radius, setRadius] = useState(50); // Default 50m

            // Mock real-time updates
            useEffect(() => {
                let interval;
                if (sessionCode) {
                    interval = setInterval(() => {
                        // In a real app, this would be a WebSocket or Firebase snapshot listener
                        const currentSession = getGlobalSession();
                        if (currentSession && currentSession.attendees.length !== attendees.length) {
                            setAttendees([...currentSession.attendees]);
                        }
                    }, 2000);
                }
                return () => clearInterval(interval);
            }, [sessionCode, attendees]);

            const handleCreateSession = () => {
                setLoading(true);
                setError('');

                getMockOrRealLocation((position) => {
                    const code = generateCode();
                    const newSession = {
                        code,
                        teacherLat: position.coords.latitude,
                        teacherLon: position.coords.longitude,
                        radius: radius,
                        subject,
                        className,
                        expiresAt: Date.now() + 10 * 60 * 1000, // 10 mins
                        attendees: []
                    };

                    setGlobalSession(newSession);
                    setSessionCode(code);
                    setLoading(false);
                    if (position.isMock) {
                        setError('Note: Using simulated location (browser blocked actual GPS).');
                    }
                });
            };

            const manualOverride = (student) => {
                const session = getGlobalSession();
                if (session && !session.attendees.find(a => a.id === student.id)) {
                    session.attendees.push({ ...student, manual: true, timestamp: new Date().toISOString() });
                    setGlobalSession(session);
                    setAttendees([...session.attendees]);
                }
            };

            const endSession = () => {
                setGlobalSession(null);
                setSessionCode(null);
                setAttendees([]);
            };

            if (!sessionCode) {
                return (
                    <div className="container animate-fade-in">
                        <div className="dashboard-header">
                            <div>
                                <h2>Teacher Dashboard</h2>
                                <p>Create a new geofenced class session</p>
                            </div>
                            <button className="btn btn-outline" onClick={logout}>Logout</button>
                        </div>

                        <div className="glass-panel" style={{ padding: '2rem', maxWidth: '600px', margin: '0 auto' }}>
                            {error && <div style={{ color: 'var(--danger)', marginBottom: '1rem' }}>{error}</div>}

                            <div className="form-group">
                                <label className="form-label">Subject</label>
                                <input type="text" className="form-control" value={subject} onChange={e => setSubject(e.target.value)} />
                            </div>

                            <div className="form-group">
                                <label className="form-label">Class</label>
                                <input type="text" className="form-control" value={className} onChange={e => setClassName(e.target.value)} />
                            </div>

                            <div className="form-group">
                                <label className="form-label">Geofence Radius (meters)</label>
                                <select className="form-control" value={radius} onChange={e => setRadius(Number(e.target.value))}>
                                    <option value={30}>30m (Small Classroom)</option>
                                    <option value={50}>50m (Standard Lecture Hall)</option>
                                    <option value={100}>100m (Large Auditorium/Thick Walls)</option>
                                    <option value={200}>200m (Campus Wide - Testing)</option>
                                </select>
                                <p style={{ fontSize: '0.8rem', marginTop: '0.5rem' }}>
                                    Tip: Increase radius for thick concrete buildings where GPS accuracy may drop.
                                </p>
                            </div>

                            <button className="btn btn-primary" style={{ width: '100%' }} onClick={handleCreateSession} disabled={loading}>
                                {loading ? 'Getting Location...' : 'Start Session & Generate Code'}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container animate-fade-in">
                    <div className="dashboard-header">
                        <div>
                            <h2>Active Session: {subject}</h2>
                            <p>Radius set to {radius}m. <span className="pulse-dot"></span> Tracking active.</p>
                        </div>
                        <button className="btn btn-danger" onClick={endSession}>End Session</button>
                    </div>

                    <div className="grid grid-2">
                        <div className="glass-panel" style={{ padding: '2rem', textAlign: 'center', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                            <h3>Session Code</h3>
                            <p>Share this code with your students</p>
                            <div className="session-code-display">{sessionCode}</div>
                            <p style={{ fontSize: '0.875rem' }}>Valid for 10 minutes</p>
                        </div>

                        <div className="glass-panel" style={{ padding: '2rem', maxHeight: '500px', overflowY: 'auto' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                <h3>Attendees ({attendees.length})</h3>
                            </div>

                            {attendees.length === 0 ? (
                                <p style={{ textAlign: 'center', padding: '2rem 0' }}>Waiting for students to join...</p>
                            ) : (
                                <div className="student-list">
                                    {attendees.map(a => (
                                        <div key={a.id} className="student-list-item glass-card" style={{ marginBottom: '0.5rem' }}>
                                            <div className="student-info">
                                                <div className="avatar">{a.name.charAt(0)}</div>
                                                <div>
                                                    <div style={{ fontWeight: '500' }}>{a.name}</div>
                                                    <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>
                                                        {a.id} {a.manual ? '(Manual)' : '(GPS Verified)'}
                                                    </div>
                                                </div>
                                            </div>
                                            <span className="badge badge-success">Present</span>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div style={{ marginTop: '2rem', borderTop: '1px solid var(--glass-border)', paddingTop: '1rem' }}>
                                <h4 style={{ marginBottom: '1rem' }}>Manual Override</h4>
                                <div style={{ display: 'flex', gap: '0.5rem' }}>
                                    <select id="manualSelect" className="form-control">
                                        {MOCK_STUDENTS.filter(s => !attendees.find(a => a.id === s.id)).map(s => (
                                            <option key={s.id} value={s.id}>{s.name} ({s.id})</option>
                                        ))}
                                    </select>
                                    <button className="btn btn-outline" onClick={() => {
                                        const sel = document.getElementById('manualSelect');
                                        if (sel.value) {
                                            const student = MOCK_STUDENTS.find(s => s.id === sel.value);
                                            if (student) manualOverride(student);
                                        }
                                    }}>Mark</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function StudentDashboard({ logout }) {
            const [code, setCode] = useState('');
            const [status, setStatus] = useState('idle'); // idle, loading, success, error
            const [message, setMessage] = useState('');

            // Hardcoded student for demo
            const student = MOCK_STUDENTS[0];

            const handleMarkAttendance = () => {
                if (!code) {
                    setStatus('error');
                    setMessage('Please enter a session code.');
                    return;
                }

                setStatus('loading');
                setMessage('Verifying location...');

                getMockOrRealLocation((position) => {
                    const session = getGlobalSession();
                    // Validate code against globalSession (simulating backend check)
                    if (!session) {
                        setStatus('error');
                        setMessage('Invalid session code or session ended.');
                        return;
                    }

                    if (session.code !== code) {
                        setStatus('error');
                        setMessage('Incorrect session code.');
                        return;
                    }

                    if (Date.now() > session.expiresAt) {
                        setStatus('error');
                        setMessage('Session code has expired.');
                        return;
                    }

                    // Check if already marked
                    if (session.attendees.find(a => a.id === student.id)) {
                        setStatus('error');
                        setMessage('Attendance already marked for this session.');
                        return;
                    }

                    const studentLat = position.coords.latitude;
                    const studentLon = position.coords.longitude;

                    const distance = getDistanceFromLatLonInM(
                        session.teacherLat, session.teacherLon,
                        studentLat, studentLon
                    );

                    if (distance <= session.radius) {
                        // Success!
                        session.attendees.push({
                            ...student,
                            manual: false,
                            timestamp: new Date().toISOString(),
                            distance: Math.round(distance)
                        });
                        setGlobalSession(session);
                        setStatus('success');
                        setMessage(`Attendance marked successfully! You are ${Math.round(distance)}m from the teacher.`);
                    } else {
                        // Failed geofence
                        setStatus('error');
                        setMessage(`Geofence failed. You are ${Math.round(distance)}m away (Radius is ${session.radius}m). Please move closer.`);
                    }
                });
            };

            return (
                <div className="container animate-fade-in">
                    <div className="dashboard-header">
                        <div>
                            <h2>Student Portal</h2>
                            <p>Welcome back, {student.name}</p>
                        </div>
                        <button className="btn btn-outline" onClick={logout}>Logout</button>
                    </div>

                    <div className="glass-panel auth-container" style={{ margin: '0 auto', maxWidth: '500px' }}>
                        <h3 style={{ marginBottom: '1.5rem' }}>Mark Attendance</h3>

                        <div className="form-group">
                            <input
                                type="text"
                                className="form-control"
                                placeholder="Enter 6-digit Code"
                                value={code}
                                onChange={e => setCode(e.target.value)}
                                style={{ fontSize: '1.5rem', textAlign: 'center', letterSpacing: '0.25rem' }}
                                maxLength={6}
                            />
                        </div>

                        <button
                            className="btn btn-primary"
                            style={{ width: '100%', marginBottom: '1rem' }}
                            onClick={handleMarkAttendance}
                            disabled={status === 'loading' || status === 'success'}
                        >
                            {status === 'loading' ? 'Locating...' : 'Mark Present'}
                        </button>

                        {status === 'success' && (
                            <div style={{ color: 'var(--success)', padding: '1rem', background: 'rgba(16, 185, 129, 0.1)', borderRadius: 'var(--border-radius-sm)', display: 'flex', alignItems: 'center', gap: '0.5rem', justifyContent: 'center' }}>
                                <Icons.Check /> {message}
                            </div>
                        )}

                        {status === 'error' && (
                            <div style={{ color: 'var(--danger)', padding: '1rem', background: 'rgba(239, 68, 68, 0.1)', borderRadius: 'var(--border-radius-sm)' }}>
                                {message}
                            </div>
                        )}

                        <div className="privacy-note">
                            <Icons.MapPin />
                            <div>
                                <strong>Privacy Note:</strong> Your GPS location is only accessed locally at the exact moment you click "Mark Present" to verify you are in the classroom. We do not track your location in the background.
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminDashboard({ logout }) {
            return (
                <div className="container animate-fade-in">
                    <div className="dashboard-header">
                        <div>
                            <h2>ERP / Admin Dashboard</h2>
                            <p>System Overview & Analytics</p>
                        </div>
                        <button className="btn btn-outline" onClick={logout}>Logout</button>
                    </div>

                    <div className="grid grid-3" style={{ marginBottom: '2rem' }}>
                        <div className="glass-card" style={{ padding: '1.5rem' }}>
                            <h4 style={{ color: 'var(--text-muted)', marginBottom: '0.5rem' }}>Total Sessions Today</h4>
                            <div style={{ fontSize: '2.5rem', fontWeight: '700', color: 'var(--primary)' }}>24</div>
                        </div>
                        <div className="glass-card" style={{ padding: '1.5rem' }}>
                            <h4 style={{ color: 'var(--text-muted)', marginBottom: '0.5rem' }}>Average Attendance</h4>
                            <div style={{ fontSize: '2.5rem', fontWeight: '700', color: 'var(--secondary)' }}>87%</div>
                        </div>
                        <div className="glass-card" style={{ padding: '1.5rem' }}>
                            <h4 style={{ color: 'var(--text-muted)', marginBottom: '0.5rem' }}>Geofence Failures</h4>
                            <div style={{ fontSize: '2.5rem', fontWeight: '700', color: 'var(--warning)' }}>12</div>
                        </div>
                    </div>

                    <div className="glass-panel" style={{ padding: '1.5rem' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                            <h3>Recent Attendance Logs</h3>
                            <div style={{ display: 'flex', gap: '1rem' }}>
                                <button className="btn btn-outline" style={{ padding: '0.5rem 1rem' }}>Filter</button>
                                <button className="btn btn-primary" style={{ padding: '0.5rem 1rem' }}>Export PDF</button>
                            </div>
                        </div>

                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Student ID</th>
                                        <th>Name</th>
                                        <th>Subject</th>
                                        <th>Date / Time</th>
                                        <th>Status</th>
                                        <th>Method</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>S001</td>
                                        <td>Alice Johnson</td>
                                        <td>Computer Science 101</td>
                                        <td>Today, 10:45 AM</td>
                                        <td><span className="badge badge-success">Present</span></td>
                                        <td>GPS (12m)</td>
                                    </tr>
                                    <tr>
                                        <td>S002</td>
                                        <td>Bob Smith</td>
                                        <td>Computer Science 101</td>
                                        <td>Today, 10:47 AM</td>
                                        <td><span className="badge badge-success">Present</span></td>
                                        <td>Manual Override</td>
                                    </tr>
                                    <tr>
                                        <td>S004</td>
                                        <td>Diana Prince</td>
                                        <td>Physics 202</td>
                                        <td>Today, 09:15 AM</td>
                                        <td><span className="badge badge-warning">Late</span></td>
                                        <td>GPS (45m)</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [role, setRole] = useState(null); // 'teacher', 'student', 'admin', null

            const renderView = () => {
                switch (role) {
                    case 'teacher':
                        return <TeacherDashboard logout={() => setRole(null)} />;
                    case 'student':
                        return <StudentDashboard logout={() => setRole(null)} />;
                    case 'admin':
                        return <AdminDashboard logout={() => setRole(null)} />;
                    default:
                        return <RoleSelection setRole={setRole} />;
                }
            };

            return (
                <div className="main-content">
                    {renderView()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
